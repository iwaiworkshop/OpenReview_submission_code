<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenReview Form Preview</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --border: #d8d8dc;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --accent: #0066cc;
    --accent-soft: #e8f0fc;
    --error: #c0392b;
    --warn-bg: #fff8e1;
    --warn-border: #ffd54f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrapper { max-width: 820px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  header h1 { font-size: 22px; margin: 0 0 4px 0; }
  header p { margin: 0; color: var(--muted); font-size: 14px; }
  .source-line {
    font-size: 13px;
    color: var(--muted);
    margin: 6px 0 0 0;
  }
  .source-line code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #ececef;
    padding: 1px 6px;
    border-radius: 3px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin: 16px 0;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar button, .toolbar label.btn {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
  }
  .toolbar button:hover, .toolbar label.btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .toolbar input[type=file] { display: none; }

  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 36px 24px;
    text-align: center;
    background: var(--card);
    color: var(--muted);
    transition: border-color .15s, background .15s;
    cursor: pointer;
  }
  .dropzone.active {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
  }
  .dropzone strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 15px; }

  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 32px;
  }
  .field {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid #ececef;
  }
  .field:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .field-label {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .field-order {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    background: #f0f0f3;
    padding: 1px 6px;
    border-radius: 3px;
  }
  .field-key {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }
  .field-description { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  input[type=text] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 14px; font-family: inherit;
  }
  textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 14px; min-height: 140px;
    font-family: inherit; resize: vertical;
  }
  select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 14px; background: white;
  }
  .radio-group { display: flex; flex-direction: column; gap: 6px; }
  .radio-option {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 10px; border-radius: 4px; cursor: pointer;
    font-size: 14px; border: 1px solid transparent;
  }
  .radio-option:hover { background: var(--accent-soft); }
  .radio-option input { margin-top: 3px; flex-shrink: 0; }
  .meta-line {
    font-size: 12px; color: var(--muted); margin-top: 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .error {
    color: var(--error); background: #fdecea; padding: 12px;
    border-radius: 4px; border: 1px solid #f5c6cb; font-size: 14px;
  }
  .warn {
    background: var(--warn-bg); border: 1px solid var(--warn-border);
    padding: 12px 14px; border-radius: 6px; font-size: 13px;
    color: #5d4a00; margin-bottom: 16px;
  }
  .warn code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 3px;
  }
  .summary {
    background: #fafafb; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 16px; margin-bottom: 20px;
    font-size: 13px;
  }
  .summary code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #f0f0f3; padding: 1px 5px; border-radius: 3px; font-size: 12px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>OpenReview Form Preview</h1>
    <p>Renders your review form JSON the way reviewers would see it on OpenReview. Nothing is submitted — this is local only.</p>
    <p class="source-line">Looks for <code id="filename-display">Openreview_paper_evaluation_criteria.json</code> next to this HTML file.</p>
  </header>

  <div id="status"></div>

  <div class="toolbar">
    <button id="reload-btn">Reload from file</button>
    <label class="btn">
      Load different JSON
      <input type="file" id="file-input" accept=".json,application/json">
    </label>
  </div>

  <div id="summary" class="summary" style="display:none"></div>
  <div id="form-container"></div>
</div>

<script>
const JSON_FILENAME = 'Openreview_paper_evaluation_criteria.json';
document.getElementById('filename-display').textContent = JSON_FILENAME;

const statusEl = document.getElementById('status');
const formEl = document.getElementById('form-container');
const summaryEl = document.getElementById('summary');

function showError(message) {
  formEl.innerHTML = `<div class="error">${message}</div>`;
  summaryEl.style.display = 'none';
}

function showFileFallback(reason) {
  statusEl.innerHTML = `
    <div class="warn">
      <strong>Could not auto-load the JSON file.</strong><br>
      ${reason}<br>
      Drop the file below, or click to choose it. Tip: serving this folder with a local web server
      (e.g. <code>python3 -m http.server</code>) lets it auto-load on refresh.
    </div>
    <div id="dropzone" class="dropzone">
      <strong>Drop ${JSON_FILENAME} here</strong>
      or click to browse
    </div>
  `;
  formEl.innerHTML = '';
  summaryEl.style.display = 'none';
  wireDropzone();
}

function wireDropzone() {
  const dz = document.getElementById('dropzone');
  if (!dz) return;
  dz.addEventListener('click', () => document.getElementById('file-input').click());
  dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('active'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('active'));
  dz.addEventListener('drop', (e) => {
    e.preventDefault();
    dz.classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });
}

function readFile(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      statusEl.innerHTML = '';
      renderForm(parsed, file.name);
    } catch (err) {
      showError('Could not parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

async function loadFromFetch() {
  try {
    const res = await fetch(JSON_FILENAME, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const parsed = await res.json();
    statusEl.innerHTML = '';
    renderForm(parsed, JSON_FILENAME);
  } catch (err) {
    const isFileProtocol = location.protocol === 'file:';
    const reason = isFileProtocol
      ? `This page was opened directly from disk (<code>file://</code>), and browsers block local file access for security.`
      : `Reason: ${err.message}. Make sure <code>${JSON_FILENAME}</code> is in the same folder as this HTML file.`;
    showFileFallback(reason);
  }
}

function renderForm(spec, sourceLabel) {
  formEl.innerHTML = '';

  if (!spec || typeof spec !== 'object' || Array.isArray(spec)) {
    showError('Invalid JSON: expected an object with field definitions at the top level.');
    return;
  }

  const entries = Object.entries(spec).sort((a, b) => {
    const oa = (a[1] && a[1].order) || 0;
    const ob = (b[1] && b[1].order) || 0;
    return oa - ob;
  });

  if (entries.length === 0) {
    showError('JSON parsed, but no fields were found.');
    return;
  }

  summaryEl.style.display = 'block';
  summaryEl.innerHTML =
    `Loaded <code>${sourceLabel}</code> — <strong>${entries.length}</strong> fields: ` +
    entries.map(([k]) => `<code>${k}</code>`).join(' ');

  const card = document.createElement('div');
  card.className = 'form-card';

  for (const [key, field] of entries) {
    const wrapper = document.createElement('div');
    wrapper.className = 'field';

    const param = field?.value?.param || {};
    const label = document.createElement('div');
    label.className = 'field-label';
    label.innerHTML = `
      <span class="field-order">#${field.order ?? '?'}</span>
      <span>${prettyKey(key)}</span>
      <span class="field-key">${key}</span>
    `;
    wrapper.appendChild(label);

    if (field.description) {
      const desc = document.createElement('div');
      desc.className = 'field-description';
      desc.textContent = field.description;
      wrapper.appendChild(desc);
    }

    const inputType = param.input;
    const hasEnum = Array.isArray(param.enum);

    if (hasEnum && inputType === 'radio') {
      const group = document.createElement('div');
      group.className = 'radio-group';
      param.enum.forEach((opt) => {
        const lbl = document.createElement('label');
        lbl.className = 'radio-option';
        lbl.innerHTML = `<input type="radio" name="${key}" value="${opt.value}"><span>${escapeHtml(opt.description)}</span>`;
        group.appendChild(lbl);
      });
      wrapper.appendChild(group);
    } else if (hasEnum && inputType === 'select') {
      const sel = document.createElement('select');
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '— Select —';
      sel.appendChild(placeholder);
      param.enum.forEach((opt) => {
        const o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.description;
        sel.appendChild(o);
      });
      wrapper.appendChild(sel);
    } else if (inputType === 'textarea' || (param.maxLength && param.maxLength > 500)) {
      const ta = document.createElement('textarea');
      if (param.maxLength) ta.maxLength = param.maxLength;
      ta.placeholder = param.markdown ? 'Markdown supported…' : '';
      wrapper.appendChild(ta);
    } else if (param.type === 'string') {
      const inp = document.createElement('input');
      inp.type = 'text';
      if (param.regex) inp.pattern = param.regex;
      wrapper.appendChild(inp);
    } else {
      const note = document.createElement('div');
      note.className = 'error';
      note.textContent = `Could not determine input type for "${key}". Check the param block.`;
      wrapper.appendChild(note);
    }

    const meta = document.createElement('div');
    meta.className = 'meta-line';
    const bits = [];
    if (param.type) bits.push(`type=${param.type}`);
    if (inputType) bits.push(`input=${inputType}`);
    if (param.regex) bits.push(`regex=${param.regex}`);
    if (param.minLength != null) bits.push(`min=${param.minLength}`);
    if (param.maxLength != null) bits.push(`max=${param.maxLength}`);
    if (param.markdown) bits.push('markdown');
    if (hasEnum) bits.push(`enum[${param.enum.length}]`);
    meta.textContent = bits.join('  ·  ');
    wrapper.appendChild(meta);

    card.appendChild(wrapper);
  }

  formEl.appendChild(card);
}

function prettyKey(k) {
  return k.charAt(0).toUpperCase() + k.slice(1);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('reload-btn').addEventListener('click', loadFromFetch);
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) readFile(file);
});

loadFromFetch();
</script>
</body>
</html>
